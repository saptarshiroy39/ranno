name: HuggingFace Space Deployment

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME /tmp/hf_space

          cd /tmp/hf_space
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +

          cd $GITHUB_WORKSPACE
          cp -r lib/. /tmp/hf_space/

          cd /tmp/hf_space
          git add .

          if ! git diff --staged --quiet; then
            git commit -m "Deploy from GitHub Actions: ${{ github.sha }}"
            git push origin main
            echo "Deployment to HuggingFace Space successful!"
          else
            echo "No changes detected. Deployment skipped."
          fi
